# Hardware yaw_candidate template. This uses only backends implemented by
# robot_slamd: CJC BL4820 dual-UART wheel encoder, ICM43600 FFI gyro, and 3-ToF ioctl input.
# Missing files/devices fail clearly instead of silently falling back to sim.
robot:
  wheel_base_m: 0.180
  wheel_radius_left_m: 0.032
  wheel_radius_right_m: 0.032
  encoder_ticks_per_rev: 1024

encoder:
  mode: cjc_bl4820_uart
  left_port: /dev/ttyS1
  right_port: /dev/ttyS2
  baudrate: 1000000
  left_id: 1
  right_id: 1
  counts_per_rev: 1024
  read_hz: 100
  position_unwrap: true
  speed_diagnostic: true
  left_sign: 1
  right_sign: 1
  max_pair_skew_us: 10000
  max_read_latency_us: 10000
  require_status_zero: true
  require_pair_skew_ok_for_odometry: true

imu:
  source: icm43600_ffi
  path: /dev/imu
  icm43600_lib_path: /userdata/libicm43600.so
  icm43600_device_no: 0
  icm43600_accel_rate_hz: 100
  icm43600_gyro_rate_hz: 100
  icm43600_batch_timeout_ms: 0
  icm43600_accel_fsr: 2
  icm43600_gyro_fsr: 3
  icm43600_high_res_fifo: false
  mode: localization
  gyro_axis: z
  gyro_sign: 1
  gyro_bias_static_calib_s: 0.5
  static_gyro_max_abs_rad_s: 0.03
  yaw_fusion_alpha: 0.95

localization:
  encoder_max_wheel_speed_mps: 1.0
  gyro_lpf_alpha: 0.30
  gyro_spike_radps: 4.0
  stationary_linear_speed_mps: 0.01
  stationary_angular_speed_radps: 0.02
  gyro_bias_adapt_alpha: 0.001

tof:
  source: mt3801_ioctl
  csv_path: /userdata/tof.csv
  frequency_hz: 30
  min_range_m: 0.02
  max_range_m: 5.0
  confidence_min: 70
  median_window: 5
  jump_reject_m: 0.6
  mad_reject_m: 0.20
  stable_hits_required: 2

tof_devices:
  front: /dev/mt3801_front
  left: /dev/mt3801_left
  right: /dev/mt3801_right

tof_extrinsics:
  front.x_m: 0.10
  front.y_m: 0.00
  front.yaw_deg: 0
  front.fov_deg: 10
  left.x_m: 0.00
  left.y_m: 0.08
  left.yaw_deg: 90
  left.fov_deg: 10
  right.x_m: 0.00
  right.y_m: -0.08
  right.yaw_deg: -90
  right.fov_deg: 10

mapping:
  resolution_m: 0.05
  chunk_cells: 64
  initial_width_m: 10.0
  initial_height_m: 10.0
  ray_step_deg: 2.0
  hit_thickness_m: 0.08
  log_odds_occ: 0.85
  log_odds_free: -0.35
  log_odds_min: -3.5
  log_odds_max: 3.5
  occupied_thresh: 0.65
  free_thresh: 0.25
  max_cells_per_tof_update: 4096
  static_scan_stable_required: 3
  static_scan_boost: 1.5

runtime:
  localization_hz: 50
  tof_read_hz: 30
  mapping_hz: 10
  log_hz: 10

runtime_limits:
  max_linear_speed_mps: 0.25
  pause_linear_speed_mps: 0.40
  max_angular_speed_radps: 0.785
  pause_angular_speed_radps: 1.571

logging:
  output_dir: /userdata/robot_slamd_hw_yaw_candidate

map_saver:
  save_on_exit: true
  autosave_period_s: 0

map_quality:
  enabled: true
  log_hz: 1.0
  min_tof_valid_ratio: 0.30
  min_map_update_rate_hz: 1.0
  min_occupied_cells: 5
  low_quality_score_threshold: 0.40
  degraded_score_threshold: 0.25
  window_s: 5.0

mapping_supervisor:
  enabled: true
  log_hz: 1.0
  startup_grace_s: 3.0
  min_ready_time_s: 2.0
  min_good_quality_score: 0.40
  degraded_quality_score: 0.25
  lost_quality_score: 0.10
  max_degraded_duration_s: 10.0
  max_no_data_duration_s: 5.0
  require_two_tof_routes: true
  active_scan_after_low_quality_s: 3.0
  active_scan_after_low_update_s: 3.0
  encoder_error_degraded_threshold: 5
  imu_error_degraded_threshold: 5
  tof_unhealthy_degraded_threshold: 1

active_scan:
  enabled: true
  log_hz: 1.0
  startup_scan_enabled: true
  low_quality_scan_enabled: true
  degraded_scan_enabled: true
  lost_scan_enabled: true
  min_interval_s: 15.0
  cooldown_s: 10.0
  request_hold_s: 1.0
  max_pending_s: 30.0
  recommended_scan_angle_deg: 360.0
  min_useful_scan_angle_deg: 90.0
  complete_scan_angle_deg: 300.0
  min_tof_valid_ratio_for_scan: 0.20
  min_valid_tof_routes_for_scan: 1
  max_linear_speed_for_scan_mps: 0.05
  min_yaw_rate_for_observed_scan_dps: 5.0
  max_yaw_rate_for_observed_scan_dps: 90.0
  observe_natural_rotation: true
  require_supervisor_recommendation: true

active_scan_execution:
  enabled: true
  mode: dry_run
  log_hz: 5.0
  require_active_scan_would_start: true
  require_scan_recommended: true
  require_localization_valid: true
  target_scan_angle_deg: 360.0
  complete_scan_angle_deg: 300.0
  min_useful_scan_angle_deg: 90.0
  target_yaw_rate_dps: 20.0
  min_observed_yaw_rate_dps: 3.0
  max_observed_yaw_rate_dps: 60.0
  max_linear_speed_mps: 0.05
  precheck_hold_s: 0.5
  command_timeout_s: 30.0
  cooldown_s: 10.0
  emit_zero_command_on_stop: true
  command_log_only: true
  hardware_write_enabled: false

sparse_scan:
  enabled: true
  log_hz: 5.0
  collect_on_active_scan: true
  collect_on_command_verifying: true
  collect_on_natural_rotation: true
  require_active_scan_recommended: false
  require_mapping_allowed: false
  min_yaw_rate_dps: 3.0
  max_yaw_rate_dps: 90.0
  max_linear_speed_mps: 0.08
  min_range_m: 0.02
  max_range_m: 10.0
  min_confidence: 70
  bin_angle_deg: 5.0
  min_session_angle_deg: 45.0
  useful_session_angle_deg: 90.0
  complete_session_angle_deg: 300.0
  session_timeout_s: 20.0
  max_gap_s: 1.0
  cooldown_s: 3.0
  keep_invalid_samples: true
  compute_hit_points: true
  write_sample_log: true
  write_bin_log: true
  write_session_log: true
  max_samples_per_session: 2000

sparse_scan_yaw_match:
  enabled: true
  log_hz: 2.0
  run_on_completed_sparse_scan: true
  run_on_useful_sparse_scan: true
  require_complete_session: false
  max_yaw_search_deg: 10.0
  coarse_step_deg: 1.0
  refine_enabled: true
  refine_window_deg: 2.0
  refine_step_deg: 0.25
  min_valid_samples: 15
  min_valid_bins: 8
  min_observed_yaw_delta_deg: 90.0
  min_valid_bin_ratio: 0.10
  occupied_search_radius_m: 0.12
  occupied_hit_reward: 1.0
  free_hit_penalty: 0.7
  unknown_hit_penalty: 0.2
  distance_penalty_scale_m: 0.20
  min_best_score: 0.20
  min_score_margin: 0.08
  min_inlier_ratio: 0.20
  max_curve_flatness: 0.80
  multimodal_check_enabled: true
  multimodal_peak_separation_deg: 3.0
  max_second_peak_ratio: 0.85
  max_samples_per_match: 300
  write_curve_log: true
  write_summary_log: true

yaw_correction:
  enabled: true
  mode: dry_run
  log_hz: 2.0
  require_yaw_match_usable: true
  require_mapping_state_ok: true
  require_low_speed_or_static: true
  require_active_scan_complete: true
  scan_completion_source: either
  allow_yaw_match_evidence_complete: true
  min_match_observed_yaw_delta_deg: 90.0
  min_match_valid_samples: 15
  min_match_valid_bins: 8
  min_match_valid_bin_ratio: 0.10
  require_yaw_match_attempted: true
  max_linear_speed_mps: 0.05
  max_abs_yaw_rate_dps: 5.0
  min_best_score: 0.20
  min_score_margin: 0.08
  min_inlier_ratio: 0.20
  max_curve_flatness: 0.80
  max_candidate_abs_deg: 5.0
  min_candidate_abs_deg: 0.3
  correction_gain: 0.15
  max_step_deg: 1.0
  min_step_deg: 0.05
  consistency_window: 3
  max_consistency_spread_deg: 1.0
  cooldown_s: 5.0
  writeback_enabled: false
  acknowledgement: ""
  writeback_acknowledgement: ""
  required_writeback_acknowledgement: I_UNDERSTAND_YAW_ONLY_CORRECTION_RISK
  max_writeback_abs_deg: 1.0
  max_total_writeback_per_session_deg: 3.0
  max_writeback_count_per_session: 5
  min_seconds_between_writebacks: 5.0
  require_gate_would_apply: true
  require_gate_reason: would_apply_dry_run
  require_scan_evidence_ok: true
  require_yaw_match_evidence_ok: true
  apply_log_enabled: true

yaw_correction_post_apply:
  enabled: true
  timeout_s: 20.0
  min_improvement_deg: 0.2
  min_improvement_fraction_of_applied_delta: 0.3
  min_absolute_improvement_deg: 0.05
  max_allowed_worse_deg: 0.5
  require_new_scan_id: true
  require_newer_match_timestamp: true
  max_post_apply_candidate_abs_deg: 10.0
  log_enabled: true

recovery:
  enabled: true
  mode: observe_only
  log_hz: 2.0
  startup_recovery_enabled: true
  lost_recovery_enabled: true
  degraded_recovery_enabled: true
  startup_grace_s: 3.0
  lost_confirm_s: 2.0
  degraded_confirm_s: 5.0
  require_map_quality_not_invalid: true
  require_min_known_cells: 50
  require_min_occupied_cells: 5
  require_tof_recent: true
  max_tof_age_s: 1.0
  require_localizer_initialized_for_local_recovery: true
  allow_uninitialized_startup_recovery_observe_only: true
  request_recovery_scan: true
  recovery_scan_cooldown_s: 10.0
  require_yaw_correction_stable: true
  max_recent_yaw_apply_count: 3
  min_post_apply_validated_count: 0
  block_if_post_apply_failed_recent: true
  write_candidate_log: true
  write_event_log: true

motion_execution:
  enabled: true
  mode: dry_run
  log_hz: 5.0
  command_source: active_scan_command
  allow_recovery_scan_request_as_reason: true
  require_active_scan_command: true
  require_command_planner_verifying_or_commanding: true
  wheel_base_m: 0.160
  wheel_radius_m: 0.032
  max_linear_speed_mps: 0.0
  max_abs_yaw_rate_dps: 20.0
  max_wheel_speed_rpm: 60.0
  min_wheel_speed_rpm: 3.0
  max_command_duration_s: 5.0
  deadman_timeout_s: 0.3
  command_stale_timeout_s: 0.5
  require_localizer_initialized: true
  require_supervisor_not_lost: true
  require_tof_recent: true
  max_tof_age_s: 0.5
  obstacle_stop_enabled: true
  min_front_distance_m: 0.25
  min_side_distance_m: 0.15
  require_encoder_feedback_recent: true
  max_encoder_age_s: 0.5
  current_safety_enabled: true
  max_motor_current_a: 3.0
  stall_detection_enabled: true
  stall_speed_rpm: 2.0
  stall_current_a: 2.0
  stall_confirm_count: 3
  dry_run_write_motor_commands: false
  hardware_write_enabled: false
  writeback_acknowledgement: ""
  required_writeback_acknowledgement: I_UNDERSTAND_MOTOR_WRITE_RISK
  write_mode_acknowledgement: ""
  required_write_mode_acknowledgement: I_UNDERSTAND_LOW_SPEED_MOTOR_WRITE_RISK
  max_allowed_write_yaw_rate_dps: 10.0
  max_allowed_write_duration_s: 3.0
  allow_writer_dispatch: false
  writer_backend: null
  software_motion:
    max_internal_rpm_for_normalization: 30.0
    max_speed_normalized: 0.10
    command_ttl_s: 0.30
    allow_rotation_commands: false
    allow_translation_commands: false
    allow_emergency_stop: true
    require_opposite_wheel_sign_for_rotation: true
    production_interface_enabled: false
    production_transport_backend: none
    loopback_shadow_mode: true
  m2b1_preflight:
    enabled: false
    mode: confirmed_lifted_live
    require_operator_present: true
    require_robot_lifted_or_wheels_free: true
    require_emergency_stop_available: true
    max_live_speed_normalized: 0.05
    max_live_duration_s: 0.50
    direction_probe_max_speed_normalized: 0.03
    direction_probe_max_duration_s: 0.30
    require_shadow_transport_first: true
    require_left_right_direction_confirmation: true
  manual_arm:
    enable_live_motion: false
    confirmation_phrase: ""
  apply_log_enabled: true

tof_pose_correction:
  enabled: true
  mode: yaw_candidate
  update_hz: 3.0
  search_xy_m: 0.08
  search_xy_step_m: 0.02
  search_yaw_deg: 8.0
  search_yaw_step_deg: 2.0
  min_valid_tof: 2
  max_residual_m: 0.25
  min_margin: 0.05
  max_xy_m: 0.03
  max_yaw_deg: 2.0
  gain: 0.3
  mapping_mode_apply: false
  candidate_lpf_alpha: 0.2
  required_consistency: 3
  consistency_yaw_deg: 1.0
  min_candidate_reliability: 0.7
  min_best_second_margin: 0.02
  yaw_residual_curve_debug: true
  debug_pose_offset_x_m: 0.0
  debug_pose_offset_y_m: 0.0
  debug_pose_offset_yaw_deg: 0.0
